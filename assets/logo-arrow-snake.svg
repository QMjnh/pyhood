<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0d1117" stroke="#16c784" stroke-width="3"/>
  
  <!-- Arrow shaft (diagonal, going up-right = bullish) -->
  <line x1="45" y1="155" x2="145" y2="45" stroke="#e6e6e6" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Arrow head -->
  <polygon points="145,45 125,50 140,65" fill="#e6e6e6"/>
  
  <!-- Arrow feathers -->
  <line x1="45" y1="155" x2="35" y2="145" stroke="#16c784" stroke-width="3" stroke-linecap="round"/>
  <line x1="45" y1="155" x2="55" y2="148" stroke="#16c784" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="152" x2="38" y2="158" stroke="#16c784" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Snake coiled around arrow -->
  <path d="M70 130 Q60 120 75 115 Q90 110 80 100 Q70 90 85 85 Q100 80 90 70 Q80 60 95 55 Q110 50 105 60" 
        fill="none" stroke="#16c784" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Snake head at top -->
  <circle cx="105" cy="60" r="6" fill="#16c784"/>
  <circle cx="108" cy="58" r="2" fill="#0d1117"/>
  
  <!-- Snake tongue -->
  <path d="M111 60 L118 56 M111 60 L118 64" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="100" y="185" text-anchor="middle" fill="#16c784" font-family="monospace" font-size="20" font-weight="bold">pyhood</text>
</svg>
