<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Shield shape -->
  <path d="M100 15 
           L170 45 
           L170 100 
           Q170 155 100 190 
           Q30 155 30 100 
           L30 45 
           Z" 
        fill="#1a1a2e" stroke="#16c784" stroke-width="4"/>
  
  <!-- Inner shield border -->
  <path d="M100 30 
           L158 55 
           L158 98 
           Q158 145 100 175 
           Q42 145 42 98 
           L42 55 
           Z" 
        fill="none" stroke="#16c784" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Large "py" text -->
  <text x="100" y="105" text-anchor="middle" fill="#16c784" font-family="monospace" font-size="52" font-weight="bold">py</text>
  
  <!-- Small chart line (uptrend) -->
  <polyline points="60,130 75,125 85,132 100,118 115,122 125,110 140,105" 
            fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Chart dot at end -->
  <circle cx="140" cy="105" r="3" fill="#00ff88"/>
  
  <!-- Arrow on chart -->
  <polygon points="140,105 135,108 136,103" fill="#00ff88"/>
  
  <!-- Text below shield -->
  <text x="100" y="212" text-anchor="middle" fill="#16c784" font-family="monospace" font-size="22" font-weight="bold">pyhood</text>
</svg>
