<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#0d1117"/>
  
  <!-- Minimalist hood silhouette -->
  <path d="M100 30 
           L50 110 
           Q48 115 52 118 
           L70 125 
           Q75 115 85 108 
           L100 100 
           L115 108 
           Q125 115 130 125 
           L148 118 
           Q152 115 150 110 
           Z" 
        fill="#16c784"/>
  
  <!-- Shadow/depth on hood -->
  <path d="M100 30 L70 95 L85 108 L100 100 L115 108 L130 95 Z" 
        fill="#12a86d"/>
  
  <!-- Face shadow -->
  <path d="M75 105 Q80 95 90 90 L100 88 L110 90 Q120 95 125 105 L115 108 L100 100 L85 108 Z" 
        fill="#0d1117" opacity="0.7"/>
  
  <!-- Glowing eyes -->
  <circle cx="90" cy="98" r="3" fill="#00ff88"/>
  <circle cx="110" cy="98" r="3" fill="#00ff88"/>
  
  <!-- Subtle py mark on forehead -->
  <text x="100" y="82" text-anchor="middle" fill="#0d1117" font-family="monospace" font-size="14" font-weight="bold" opacity="0.4">py</text>
  
  <!-- Text below -->
  <text x="100" y="165" text-anchor="middle" fill="#16c784" font-family="monospace" font-size="28" font-weight="bold">pyhood</text>
  
  <!-- Subtle tagline -->
  <text x="100" y="182" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">robinhood api client</text>
</svg>
