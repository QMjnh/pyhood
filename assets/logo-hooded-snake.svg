<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#16c784" stroke-width="3"/>
  
  <!-- Hood shape -->
  <path d="M100 25 L55 95 L65 100 L75 85 L85 75 L100 68 L115 75 L125 85 L135 100 L145 95 Z" 
        fill="#16c784" opacity="0.9"/>
  
  <!-- Snake body curving out from under the hood -->
  <path d="M100 68 Q90 80 85 95 Q80 115 90 130 Q100 145 115 140 Q130 135 125 120 Q120 105 130 95 Q140 85 145 95" 
        fill="none" stroke="#16c784" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Snake head -->
  <circle cx="145" cy="95" r="8" fill="#16c784"/>
  
  <!-- Snake eye -->
  <circle cx="148" cy="93" r="2.5" fill="#1a1a2e"/>
  
  <!-- Snake tongue -->
  <path d="M153 95 L162 90 M153 95 L162 100" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Eyes in hood (glowing) -->
  <circle cx="90" cy="78" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="110" cy="78" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="90" cy="78" r="2" fill="white"/>
  <circle cx="110" cy="78" r="2" fill="white"/>
  
  <!-- Text -->
  <text x="100" y="178" text-anchor="middle" fill="#16c784" font-family="monospace" font-size="22" font-weight="bold">pyhood</text>
</svg>
